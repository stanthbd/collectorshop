apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../apps/collector/base
  - ingress.yaml

namespace: collectorshop-staging

labels:
  - includeSelectors: true
    pairs:
      env: staging
      app.kubernetes.io/managed-by: argocd

images:
  - name: ghcr.io/stanthbd/collectorshop/web-app
    newTag: latest
  - name: ghcr.io/stanthbd/collectorshop/catalog-service
    newTag: latest
  - name: ghcr.io/stanthbd/collectorshop/moderation-worker
    newTag: latest

patches:
  - target:
      kind: Ingress
      name: management-ui
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: staging.rabbitmq.local
  - target:
      kind: Ingress
      name: keycloak
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: staging.keycloak.local

replicas:
  - name: catalog-service
    count: 1
  - name: web-app
    count: 1
  - name: moderation-worker
    count: 1
  - name: keycloak
    count: 1
  - name: postgres
    count: 1
  - name: rabbitmq
    count: 1
