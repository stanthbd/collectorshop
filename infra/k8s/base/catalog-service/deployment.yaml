apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  labels:
    app: catalog-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/catalog?page=1&limit=1" # Reusing health check as a metrics mock for POC
      labels:
        app: catalog-service
    spec:
      imagePullSecrets:
      - name: ghcr-login-secret
      containers:
      - name: catalog-service
        image: collector/catalog-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        startupProbe:
          httpGet:
            path: /api/catalog?page=1&limit=1
            port: 3000
          failureThreshold: 20
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /api/catalog?page=1&limit=1
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /api/catalog?page=1&limit=1
            port: 3000
          initialDelaySeconds: 2
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
        - name: POSTGRES_URL
          valueFrom:
            secretKeyRef:
              name: catalog-db-secret
              key: url
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: catalog-db-secret
              key: database-url
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: moderation-secrets
              key: rabbitmq-url
        - name: PORT
          value: "3000"
