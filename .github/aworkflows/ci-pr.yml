name: CI Pull Request

on:
  pull_request:
    branches:
      - dev
      - staging
      - main

concurrency:
  group: ci-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 20

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      catalog: ${{ steps.filter.outputs.catalog }}
      moderation: ${{ steps.filter.outputs.moderation }}
      infra: ${{ steps.filter.outputs.infra }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'apps/web-app/**'

            catalog:
              - 'services/catalog-service/**'

            moderation:
              - 'services/moderation-worker/**'

            infra:
              - 'infra/**'

            shared:
              - 'package.json'
              - 'package-lock.json'
              - 'packages/**'
              - 'tsconfig*.json'
              - '.github/workflows/**'

  security-scan:
    name: Security scan
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

  quality-catalog:
    name: Quality Catalog
    needs: detect-changes
    if: needs.detect-changes.outputs.catalog == 'true' || needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Dependency audit
        run: npm run scan --workspace=catalog-service

      - name: Lint
        run: npm run lint --workspace=catalog-service

      - name: Unit tests
        run: npm run test:unit --workspace=catalog-service

      - name: Integration tests
        run: npm run test:integration --workspace=catalog-service

      - name: Build
        run: npm run build --workspace=catalog-service

  quality-moderation:
    name: Quality Moderation
    needs: detect-changes
    if: needs.detect-changes.outputs.moderation == 'true' || needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Dependency audit
        run: npm run scan --workspace=moderation-worker

      - name: Lint
        run: npm run lint --workspace=moderation-worker

      - name: Unit tests
        run: npm run test:unit --workspace=moderation-worker

      - name: Build
        run: npm run build --workspace=moderation-worker

  quality-frontend:
    name: Quality Frontend
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Dependency audit
        run: npm run scan --workspace=web-app

      - name: Lint
        run: npm run lint --workspace=web-app

      - name: Build
        run: npm run build --workspace=web-app
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_KEYCLOAK_URL: ${{ secrets.VITE_KEYCLOAK_URL }}
          VITE_KEYCLOAK_REALM: ${{ secrets.VITE_KEYCLOAK_REALM }}
          VITE_KEYCLOAK_CLIENT_ID: ${{ secrets.VITE_KEYCLOAK_CLIENT_ID }}

  validate-infra:
    name: Validate Infra
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true' || needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Validate dev overlay
        run: kustomize build infra/k8s/overlays/dev > /tmp/dev.yaml

      - name: Validate staging overlay
        run: kustomize build infra/k8s/overlays/staging > /tmp/staging.yaml

      - name: Validate prod overlay
        run: kustomize build infra/k8s/overlays/prod > /tmp/prod.yaml

  notify-pr:
    name: Notify Discord PR
    needs:
      [
        detect-changes,
        security-scan,
        quality-catalog,
        quality-moderation,
        quality-frontend,
        validate-infra
      ]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Notify PR status
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_PR }}
          status: ${{ needs.security-scan.result == 'success' && (needs.quality-catalog.result == 'success' || needs.quality-catalog.result == 'skipped') && (needs.quality-moderation.result == 'success' || needs.quality-moderation.result == 'skipped') && (needs.quality-frontend.result == 'success' || needs.quality-frontend.result == 'skipped') && (needs.validate-infra.result == 'success' || needs.validate-infra.result == 'skipped') && 'success' || 'failure' }}
          title: "🔎 CI PR — ${{ github.repository }}"
          description: |
            **🔀 Pull Request**: `#${{ github.event.pull_request.number }}`
            **📝 Titre**: `${{ github.event.pull_request.title }}`
            **👤 Auteur**: `${{ github.event.pull_request.user.login }}`
            **🌿 Branche source**: `${{ github.event.pull_request.head.ref }}`
            **🎯 Branche cible**: `${{ github.event.pull_request.base.ref }}`
            **🔢 Run**: `#${{ github.run_number }}` (attempt `${{ github.run_attempt }}`)
            **🔖 Commit**: `${{ github.event.pull_request.head.sha }}`

            **📂 Changements détectés**
            • Shared: `${{ needs.detect-changes.outputs.shared }}`
            • Catalog: `${{ needs.detect-changes.outputs.catalog }}`
            • Moderation: `${{ needs.detect-changes.outputs.moderation }}`
            • Frontend: `${{ needs.detect-changes.outputs.frontend }}`
            • Infra: `${{ needs.detect-changes.outputs.infra }}`

            **🛡️ Sécurité**
            • Secret scan: `${{ needs.security-scan.result }}`

            **🧪 Qualité**
            • Catalog: `${{ needs.quality-catalog.result }}`
            • Moderation: `${{ needs.quality-moderation.result }}`
            • Frontend: `${{ needs.quality-frontend.result }}`
            • Infra: `${{ needs.validate-infra.result }}`

            **🔗 Workflow**
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          color: ${{ needs.security-scan.result == 'success' && (needs.quality-catalog.result == 'success' || needs.quality-catalog.result == 'skipped') && (needs.quality-moderation.result == 'success' || needs.quality-moderation.result == 'skipped') && (needs.quality-frontend.result == 'success' || needs.quality-frontend.result == 'skipped') && (needs.validate-infra.result == 'success' || needs.validate-infra.result == 'skipped') && 5763719 || 15548997 }}
          username: "Collector CI/CD"