apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../apps/collector/base
- ingress.yaml

namespace: collectorshop-dev

labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/managed-by: argocd
    env: dev

images:
- name: ghcr.io/stanthbd/collectorshop/catalog-service
  newName: ghcr.io/stanthbd/collectorshop/catalog-service
  newTag: sha-419668290590f0abd4c737847cf46759265e93f0
- name: ghcr.io/stanthbd/collectorshop/moderation-worker
  newName: ghcr.io/stanthbd/collectorshop/moderation-worker
  newTag: sha-419668290590f0abd4c737847cf46759265e93f0
- name: ghcr.io/stanthbd/collectorshop/web-app
  newName: ghcr.io/stanthbd/collectorshop/web-app
  newTag: sha-419668290590f0abd4c737847cf46759265e93f0

patches:
- patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: dev.rabbitmq.local
  target:
    kind: Ingress
    name: management-ui
- patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: dev.keycloak.local
  target:
    kind: Ingress
    name: keycloak
