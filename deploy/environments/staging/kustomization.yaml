apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../apps/collector/base
- ingress.yaml

namespace: collectorshop-staging

labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/managed-by: argocd
    env: staging

images:
- name: ghcr.io/stanthbd/collectorshop/catalog-service
  newName: ghcr.io/stanthbd/collectorshop/catalog-service
  newTag: sha-7ee62c1737dd2b679222b2d2411405626cda12c8
- name: ghcr.io/stanthbd/collectorshop/moderation-worker
  newName: ghcr.io/stanthbd/collectorshop/moderation-worker
  newTag: sha-7ee62c1737dd2b679222b2d2411405626cda12c8
- name: ghcr.io/stanthbd/collectorshop/web-app
  newName: ghcr.io/stanthbd/collectorshop/web-app
  newTag: sha-7ee62c1737dd2b679222b2d2411405626cda12c8

patches:
- patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: staging.rabbitmq.local
  target:
    kind: Ingress
    name: management-ui
- patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: staging.keycloak.local
  target:
    kind: Ingress
    name: keycloak

replicas:
- count: 1
  name: catalog-service
- count: 1
  name: web-app
- count: 1
  name: moderation-worker
- count: 1
  name: keycloak
- count: 1
  name: postgres
- count: 1
  name: rabbitmq
