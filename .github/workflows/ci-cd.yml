name: Unified CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - staging
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  pull-requests: read

env:
  REGISTRY: ghcr.io
  NODE_VERSION: 20
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 1. Détection des changements pour optimiser le pipeline
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'apps/web-app/**'
            catalog:
              - 'services/catalog-service/**'
            moderation:
              - 'services/moderation-worker/**'
            shared:
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/**'
              - 'packages/**'
              - 'tsconfig*.json'
              - 'infra/k8s/base/**'

      - name: Generate Matrix
        id: set-matrix
        run: |
          SERVICES=()
          if [ "${{ steps.filter.outputs.frontend }}" = "true" ] || [ "${{ steps.filter.outputs.shared }}" = "true" ]; then
            SERVICES+=('{"service":"web-app", "path":"apps/web-app", "id":"frontend"}')
          fi
          if [ "${{ steps.filter.outputs.catalog }}" = "true" ] || [ "${{ steps.filter.outputs.shared }}" = "true" ]; then
            SERVICES+=('{"service":"catalog-service", "path":"services/catalog-service", "id":"catalog"}')
          fi
          if [ "${{ steps.filter.outputs.moderation }}" = "true" ] || [ "${{ steps.filter.outputs.shared }}" = "true" ]; then
            SERVICES+=('{"service":"moderation-worker", "path":"services/moderation-worker", "id":"moderation"}')
          fi
          
          # Convert array to JSON string
          if [ ${#SERVICES[@]} -eq 0 ]; then
            JSON_SERVICES="[]"
            HAS_CHANGES="false"
          else
            # Join with comma
            JSON_SERVICES="[$(IFS=,; echo "${SERVICES[*]}")]"
            HAS_CHANGES="true"
          fi
          
          echo "matrix=${JSON_SERVICES}" >> $GITHUB_OUTPUT
          echo "has_changes=${HAS_CHANGES}" >> $GITHUB_OUTPUT

  # 2. Linting et Tests (exécutés en parallèle pour les composants modifiés)
  quality-check:
    name: Quality Check (${{ matrix.service }})
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace=${{ matrix.service }}

      - name: Unit tests
        run: npm run test:unit --workspace=${{ matrix.service }}
        if: matrix.service != 'web-app'

      - name: Build / Compile
        run: npm run build --workspace=${{ matrix.service }}

  # 3. Analyse de qualité SonarCloud
  sonarcloud-analysis:
    name: SonarCloud Analysis
    needs: quality-check
    if: always() && (needs.quality-check.result == 'success' || needs.quality-check.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # 4. Build & Push Docker images vers GHCR
  build-push:
    name: Build & Push (${{ matrix.service }})
    needs: [detect-changes, quality-check]
    if: |
      needs.detect-changes.outputs.has_changes == 'true' &&
      (github.ref_name == 'dev' || github.ref_name == 'staging' || github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    environment: ${{ (github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/v')) && 'prod' || (github.ref_name == 'staging' && 'staging' || 'dev') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Environment variables
        run: |
          echo "ENV_NAME=${{ (github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/v')) && 'prod' || (github.ref_name == 'staging' && 'staging' || 'dev') }}" >> $GITHUB_ENV
          echo "IMAGE_REPO_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_LOGIN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO_LC }}/${{ matrix.service }}
          tags: |
            type=raw,value=${{ env.ENV_NAME }}
            type=sha,format=long,prefix=${{ env.ENV_NAME }}-
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 5. Notifications (après le build & push)
  notify:
    name: Notification
    needs: [quality-check, sonarcloud-analysis, build-push]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Discord Notification
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ (github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/v')) && secrets.DISCORD_WEBHOOK_PROD || (github.ref_name == 'staging' && secrets.DISCORD_WEBHOOK_STAGING || secrets.DISCORD_WEBHOOK_DEV) }}
          status: ${{ (needs.quality-check.result == 'success' || needs.quality-check.result == 'skipped') && (needs.build-push.result == 'success' || needs.build-push.result == 'skipped') && 'success' || 'failure' }}
          title: "🚀 CI/CD Pipeline - ${{ github.repository }}"
          description: |
            **Environnement**: `${{ (github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/v')) && 'prod' || (github.ref_name == 'staging' && 'staging' || 'dev') }}`
            **Branche**: `${{ github.ref_name }}`
            **Numéro de run**: `${{ github.run_number }}`
            **Commit**: `${{ github.sha }}`
            
            **📊 Détails des jobs :**
            - Quality Check: `${{ needs.quality-check.result }}`
            - Sonar Analysis: `${{ needs.sonarcloud-analysis.result }}`
            - Docker Build/Push: `${{ needs.build-push.result }}`
            
            [Voir le report complet](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          username: "GitHub Actions CI/CD"
