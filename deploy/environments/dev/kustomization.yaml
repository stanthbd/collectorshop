apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../apps/collector/base
  - ingress.yaml

namespace: collectorshop-dev

labels:
  - includeSelectors: true
    pairs:
      env: dev
      app.kubernetes.io/managed-by: argocd

images:
  - name: ghcr.io/stanthbd/collectorshop/web-app
    newTag: sha-15d77ac0c1423e8a4f89f7982c872c107272de49
  - name: ghcr.io/stanthbd/collectorshop/catalog-service
    newTag: sha-15d77ac0c1423e8a4f89f7982c872c107272de49
  - name: ghcr.io/stanthbd/collectorshop/moderation-worker
    newTag: sha-15d77ac0c1423e8a4f89f7982c872c107272de49

patches:
  - target:
      kind: Ingress
      name: management-ui
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: dev.rabbitmq.local
  - target:
      kind: Ingress
      name: keycloak
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: dev.keycloak.local

