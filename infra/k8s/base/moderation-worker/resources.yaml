apiVersion: apps/v1
kind: Deployment
metadata:
  name: moderation-worker
  labels:
    app: moderation-worker
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: moderation-worker
  template:
    metadata:
      labels:
        app: moderation-worker
    spec:
      imagePullSecrets:
      - name: ghcr-login-secret
      containers:
      - name: moderation-worker
        image: collector/moderation-worker:latest
        imagePullPolicy: Always
        env:
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: moderation-secrets
              key: rabbitmq-url
        ports:
        - containerPort: 3000
          name: health
        livenessProbe:
          httpGet:
            path: /health
            port: health
          initialDelaySeconds: 10
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
