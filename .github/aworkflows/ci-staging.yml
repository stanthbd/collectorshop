name: CD Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

concurrency:
  group: cd-staging-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_REPO_LC: "" # Placeholder pour le linter, sera écrasé au runtime
  OVERLAY_PATH: infra/k8s/overlays/staging
  NODE_VERSION: 20

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      catalog: ${{ steps.filter.outputs.catalog }}
      moderation: ${{ steps.filter.outputs.moderation }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.before }}
          filters: |
            frontend:
              - 'apps/web-app/**'

            catalog:
              - 'services/catalog-service/**'

            moderation:
              - 'services/moderation-worker/**'

            shared:
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/**'
              - 'packages/**'
              - 'tsconfig*.json'
              - 'infra/k8s/**'

  quality-catalog:
    name: Quality Catalog
    needs: detect-changes
    if: needs.detect-changes.outputs.catalog == 'true' || needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Lint
        run: npm run lint --workspace=catalog-service

      - name: Unit tests
        run: npm run test:unit --workspace=catalog-service

      - name: Integration tests
        run: npm run test:integration --workspace=catalog-service

      - name: Build
        run: npm run build --workspace=catalog-service

  quality-moderation:
    name: Quality Moderation
    needs: detect-changes
    if: needs.detect-changes.outputs.moderation == 'true' || needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Lint
        run: npm run lint --workspace=moderation-worker

      - name: Unit tests
        run: npm run test:unit --workspace=moderation-worker

      - name: Build
        run: npm run build --workspace=moderation-worker

  quality-frontend:
    name: Quality Frontend
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Lint
        run: npm run lint --workspace=web-app

      - name: Build
        run: npm run build --workspace=web-app
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_KEYCLOAK_URL: ${{ secrets.VITE_KEYCLOAK_URL }}
          VITE_KEYCLOAK_REALM: ${{ secrets.VITE_KEYCLOAK_REALM }}
          VITE_KEYCLOAK_CLIENT_ID: ${{ secrets.VITE_KEYCLOAK_CLIENT_ID }}

  publish-catalog:
    name: Publish catalog-service
    needs: [detect-changes, quality-catalog]
    if: needs.detect-changes.outputs.catalog == 'true' || needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.out.outputs.image }}
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Lowercase image repo
        run: echo "IMAGE_REPO_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_LOGIN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO_LC }}/catalog-service-staging
          tags: |
            type=raw,value=latest
            type=sha,format=long,prefix=
          labels: |
            org.opencontainers.image.source=https://github.com/StanislasTHBD/collector
            org.opencontainers.image.description=Collector Catalog Service (Staging)
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push catalog-service
        uses: docker/build-push-action@v6
        with:
          context: ./services/catalog-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/StanislasTHBD/collector
            org.opencontainers.image.description=Collector Catalog Service (Staging)
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO_LC }}/catalog-service-staging:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Export image output
        id: out
        run: echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_REPO_LC }}/catalog-service-staging:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  publish-moderation:
    name: Publish moderation-worker
    needs: [detect-changes, quality-moderation]
    if: needs.detect-changes.outputs.moderation == 'true' || needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.out.outputs.image }}
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Lowercase image repo
        run: echo "IMAGE_REPO_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_LOGIN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO_LC }}/moderation-worker-staging
          tags: |
            type=raw,value=latest
            type=sha,format=long,prefix=
          labels: |
            org.opencontainers.image.source=https://github.com/StanislasTHBD/collector
            org.opencontainers.image.description=Collector Moderation Worker (Staging)
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push moderation-worker
        uses: docker/build-push-action@v6
        with:
          context: ./services/moderation-worker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/StanislasTHBD/collector
            org.opencontainers.image.description=Collector Moderation Worker (Staging)
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO_LC }}/moderation-worker-staging:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Export image output
        id: out
        run: echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_REPO_LC }}/moderation-worker-staging:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  publish-frontend:
    name: Publish web-app
    needs: [detect-changes, quality-frontend]
    if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.out.outputs.image }}
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Lowercase image repo
        run: echo "IMAGE_REPO_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_LOGIN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO_LC }}/web-app-staging
          tags: |
            type=raw,value=latest
            type=sha,format=long,prefix=
          labels: |
            org.opencontainers.image.source=https://github.com/StanislasTHBD/collector
            org.opencontainers.image.description=Collector Web App (Staging)
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push web-app
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web-app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/StanislasTHBD/collector
            org.opencontainers.image.description=Collector Web App (Staging)
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO_LC }}/web-app-staging:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Export image output
        id: out
        run: echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_REPO_LC }}/web-app-staging:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  notify-staging:
    name: Notify Discord Staging
    needs:
      [
        detect-changes,
        quality-catalog,
        quality-moderation,
        quality-frontend,
        publish-catalog,
        publish-moderation,
        publish-frontend
      ]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Notify Staging status
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_STAGING }}
          status: ${{ (needs.quality-catalog.result == 'success' || needs.quality-catalog.result == 'skipped') && (needs.quality-moderation.result == 'success' || needs.quality-moderation.result == 'skipped') && (needs.quality-frontend.result == 'success' || needs.quality-frontend.result == 'skipped') && (needs.publish-catalog.result == 'success' || needs.publish-catalog.result == 'skipped') && (needs.publish-moderation.result == 'success' || needs.publish-moderation.result == 'skipped') && (needs.publish-frontend.result == 'success' || needs.publish-frontend.result == 'skipped') && 'success' || 'failure' }}
          title: "🚀 CD STAGING — ${{ github.repository }}"
          description: |
            **🧪 Environnement**: `staging`
            **📦 Repository**: `${{ github.repository }}`
            **👤 Auteur**: `${{ github.actor }}`
            **🌿 Branche**: `${{ github.ref_name }}`
            **🔢 Run**: `#${{ github.run_number }}` (attempt `${{ github.run_attempt }}`)
            **🔖 Commit**: `${{ github.sha }}`
            **💬 Message**: `${{ github.event.head_commit.message }}`

            **📂 Changements détectés**
            • Shared: `${{ needs.detect-changes.outputs.shared }}`
            • Catalog: `${{ needs.detect-changes.outputs.catalog }}`
            • Moderation: `${{ needs.detect-changes.outputs.moderation }}`
            • Frontend: `${{ needs.detect-changes.outputs.frontend }}`

            **🧪 Qualité**
            • Catalog: `${{ needs.quality-catalog.result }}`
            • Moderation: `${{ needs.quality-moderation.result }}`
            • Frontend: `${{ needs.quality-frontend.result }}`

            **📤 Publication images**
            • Catalog: `${{ needs.publish-catalog.result }}`
            • Moderation: `${{ needs.publish-moderation.result }}`
            • Frontend: `${{ needs.publish-frontend.result }}`

            **🖼️ Images publiées**
            • Catalog: `${{ needs.publish-catalog.outputs.image || 'non publiée' }}`
            • Moderation: `${{ needs.publish-moderation.outputs.image || 'non publiée' }}`
            • Frontend: `${{ needs.publish-frontend.outputs.image || 'non publiée' }}`

            **🔗 Workflow**
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          color: ${{ (needs.quality-catalog.result == 'success' || needs.quality-catalog.result == 'skipped') && (needs.quality-moderation.result == 'success' || needs.quality-moderation.result == 'skipped') && (needs.quality-frontend.result == 'success' || needs.quality-frontend.result == 'skipped') && (needs.publish-catalog.result == 'success' || needs.publish-catalog.result == 'skipped') && (needs.publish-moderation.result == 'success' || needs.publish-moderation.result == 'skipped') && (needs.publish-frontend.result == 'success' || needs.publish-frontend.result == 'skipped') && 5763719 || 15548997 }}
          username: "Collector CI/CD"