name: CD Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: cd-prod-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_REPO_LC: "" # Placeholder pour le linter, sera écrasé au runtime
  OVERLAY_PATH: infra/k8s/overlays/prod
  NODE_VERSION: 20
  VERSION: ${{ github.ref_name }}

jobs:
  quality-security:
    name: Quality & Security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Lint all
        run: npm run lint

      - name: Security Scan (Audit)
        run: npm audit --audit-level=high

  publish-catalog:
    name: Publish catalog-service
    needs: quality-security
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    environment:
      name: prod
    outputs:
      image: ${{ steps.out.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Lowercase image repo
        run: echo "IMAGE_REPO_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_LOGIN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO_LC }}/catalog-service
          tags: |
            type=raw,value=${{ env.VERSION }}
            type=raw,value=latest
            type=sha,format=long,prefix=
          labels: |
            org.opencontainers.image.source=https://github.com/StanislasTHBD/collector
            org.opencontainers.image.description=Collector Catalog Service (Production)
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push catalog-service
        uses: docker/build-push-action@v6
        with:
          context: ./services/catalog-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/StanislasTHBD/collector
            org.opencontainers.image.description=Collector Catalog Service (Production)
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO_LC }}/catalog-service:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Export image output
        id: out
        run: echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_REPO_LC }}/catalog-service:${{ env.VERSION }}" >> "$GITHUB_OUTPUT"

  publish-moderation:
    name: Publish moderation-worker
    needs: quality-security
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    environment:
      name: prod
    outputs:
      image: ${{ steps.out.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Lowercase image repo
        run: echo "IMAGE_REPO_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_LOGIN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO_LC }}/moderation-worker
          tags: |
            type=raw,value=${{ env.VERSION }}
            type=raw,value=latest
            type=sha,format=long,prefix=
          labels: |
            org.opencontainers.image.source=https://github.com/StanislasTHBD/collector
            org.opencontainers.image.description=Collector Moderation Worker (Production)
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push moderation-worker
        uses: docker/build-push-action@v6
        with:
          context: ./services/moderation-worker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/StanislasTHBD/collector
            org.opencontainers.image.description=Collector Moderation Worker (Production)
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO_LC }}/moderation-worker:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Export image output
        id: out
        run: echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_REPO_LC }}/moderation-worker:${{ env.VERSION }}" >> "$GITHUB_OUTPUT"

  publish-frontend:
    name: Publish web-app
    needs: quality-security
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    environment:
      name: prod
    outputs:
      image: ${{ steps.out.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Lowercase image repo
        run: echo "IMAGE_REPO_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_LOGIN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO_LC }}/web-app
          tags: |
            type=raw,value=${{ env.VERSION }}
            type=raw,value=latest
            type=sha,format=long,prefix=
          labels: |
            org.opencontainers.image.source=https://github.com/StanislasTHBD/collector
            org.opencontainers.image.description=Collector Web App (Production)
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push web-app
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web-app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/StanislasTHBD/collector
            org.opencontainers.image.description=Collector Web App (Production)
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO_LC }}/web-app:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Export image output
        id: out
        run: echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_REPO_LC }}/web-app:${{ env.VERSION }}" >> "$GITHUB_OUTPUT"

  notify-prod:
    name: Notify Discord Production
    needs:
      [
        quality-security,
        publish-catalog,
        publish-moderation,
        publish-frontend
      ]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Notify Production status
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_PROD }}
          status: ${{ needs.quality-security.result == 'success' && needs.publish-catalog.result == 'success' && needs.publish-moderation.result == 'success' && needs.publish-frontend.result == 'success' && 'success' || 'failure' }}
          title: "🚀 CD PRODUCTION — ${{ github.repository }}"
          description: |
            **🏭 Environnement**: `prod`
            **📦 Repository**: `${{ github.repository }}`
            **👤 Auteur**: `${{ github.actor }}`
            **🏷️ Version**: `${{ github.ref_name }}`
            **🔢 Run**: `#${{ github.run_number }}` (attempt `${{ github.run_attempt }}`)
            **🔖 Commit**: `${{ github.sha }}`

            **🛡️ Qualité & Sécurité**
            • Quality/Security: `${{ needs.quality-security.result }}`

            **📤 Publication images**
            • Catalog: `${{ needs.publish-catalog.result }}`
            • Moderation: `${{ needs.publish-moderation.result }}`
            • Frontend: `${{ needs.publish-frontend.result }}`

            **🖼️ Images publiées**
            • Catalog: `${{ needs.publish-catalog.outputs.image || 'non publiée' }}`
            • Moderation: `${{ needs.publish-moderation.outputs.image || 'non publiée' }}`
            • Frontend: `${{ needs.publish-frontend.outputs.image || 'non publiée' }}`

            **🔗 Workflow**
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          color: ${{ needs.quality-security.result == 'success' && needs.publish-catalog.result == 'success' && needs.publish-moderation.result == 'success' && needs.publish-frontend.result == 'success' && 5763719 || 15548997 }}
          username: "Collector CI/CD"